# Path manifest - machine-readable source of truth for the BGP Fundamentals path.
# Human-readable outline lives in docs/curriculum/bgp-fundamentals.md.
# Units are referenced by id; their content lives in content/units/<id>/.
# `status` lets the app render unbuilt units as "coming soon".

id: bgp-fundamentals
title: "BGP Fundamentals"
summary: >
  From "what is BGP and why does it exist" to confidently configuring eBGP/iBGP,
  controlling path selection, and applying basic routing policy - hands-on with FRR.
network_os: frrouting/frr
status: in-progress

modules:
  - id: foundations
    title: "BGP Foundations"
    units:
      - { id: bgp-why-bgp-exists,          status: published }
      - { id: bgp-autonomous-systems,      status: published }
      - { id: bgp-path-vector,             status: published }
      - { id: bgp-sessions-and-messages,   status: published }
      - { id: lab-environment-setup,       status: published }
      - { id: bgp-observe-a-session,       status: published }

  - id: ebgp-fundamentals
    title: "eBGP Fundamentals"
    units:
      - { id: bgp-ebgp-vs-ibgp,            status: published }
      - { id: bgp-advertising-prefixes,    status: published }
      - { id: bgp-ebgp-peering,            status: published }
      - { id: bgp-advertising-routes,      status: published }
      - { id: bgp-ebgp-capstone,           status: published }

  - id: ibgp-fundamentals
    title: "iBGP Fundamentals"
    units:
      - { id: bgp-why-ibgp,                status: published }
      - { id: bgp-ibgp-full-mesh,          status: published }
      - { id: bgp-loopback-peering-and-igp, status: published }
      - { id: bgp-ibgp-peering,            status: published }
      - { id: bgp-next-hop-self,           status: published }
      - { id: bgp-ibgp-capstone,           status: published }

  - id: path-attributes
    title: "Path Attributes & Best-Path Selection"
    units:
      - { id: bgp-attribute-types,         status: published }
      - { id: bgp-as-path-and-next-hop,    status: published }
      - { id: bgp-local-pref-and-med,      status: published }
      - { id: bgp-weight-and-origin,       status: published }
      - { id: bgp-best-path-algorithm,     status: published }
      - { id: bgp-influence-local-pref,    status: published }
      - { id: bgp-as-path-prepend,         status: published }
      - { id: bgp-med-and-tiebreakers,     status: published }
      - { id: bgp-path-selection-capstone, status: published }

  - id: route-filtering
    title: "Route Filtering & Policy"
    units:
      - { id: bgp-prefix-lists,            status: published }
      - { id: bgp-route-maps,              status: published }
      - { id: bgp-communities,             status: published }
      - { id: bgp-filter-with-prefix-lists, status: published }
      - { id: bgp-route-maps-and-communities, status: published }
      - { id: bgp-policy-capstone,         status: published }
