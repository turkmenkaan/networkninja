# Lab name → containers are named clab-bgp-ibgp-peering-<node>.
name: bgp-ibgp-peering

topology:
  nodes:
    r1:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r1/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons
    r2:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r2/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons

  links:
    # Both routers live in AS 65001, connected over subnet 10.0.12.0/24.
    - endpoints: ["r1:eth1", "r2:eth1"]
