! r1 - AS 65001  (GUIDED starting state)
! Base addressing and the OSPF underlay are pre-staged. OSPF advertises the
! link and both loopbacks, so r1 already learns r2's loopback (2.2.2.2).
! The iBGP session is yours to add.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family (simpler for a first lab).
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
router ospf
 network 10.0.12.0/24 area 0
 network 1.1.1.1/32 area 0
!
! TODO: configure an iBGP session to r2's loopback (2.2.2.2) in AS 65001.
!       Peer on the loopback and source the session from lo with
!       `neighbor 2.2.2.2 update-source lo`. Advertise this router's
!       loopback (1.1.1.1/32) into BGP.
!
line vty
!
