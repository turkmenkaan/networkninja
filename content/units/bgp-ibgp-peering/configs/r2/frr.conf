! r2 - AS 65001  (GUIDED starting state)
! Base addressing and the OSPF underlay are pre-staged. OSPF advertises the
! link and both loopbacks, so r2 already learns r1's loopback (1.1.1.1).
! The iBGP session is yours to add.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
router ospf
 network 10.0.12.0/24 area 0
 network 2.2.2.2/32 area 0
!
! TODO: configure an iBGP session to r1's loopback (1.1.1.1) in AS 65001.
!       Peer on the loopback and source the session from lo with
!       `neighbor 1.1.1.1 update-source lo`. Advertise this router's
!       loopback (2.2.2.2/32) into BGP.
!
line vty
!
