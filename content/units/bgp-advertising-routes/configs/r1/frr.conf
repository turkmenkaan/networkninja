! r1 - AS 65001  (GUIDED starting state)
! The eBGP session to r2 is already configured and will come up on boot.
! What's missing: r1 isn't advertising anything yet. That part is yours to add.
! Using the "traditional" defaults profile so `network ...` auto-activates the
! IPv4-unicast address family (simpler for a first lab).
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 ! TODO: advertise this router's loopback (1.1.1.1/32) into BGP with a `network` statement.
!
line vty
!
