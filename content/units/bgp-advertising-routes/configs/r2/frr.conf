! r2 - AS 65002  (GUIDED starting state)
! The eBGP session to r1 is already configured and will come up on boot.
! What's missing: r2 isn't advertising anything yet. That part is yours to add.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 ! TODO: advertise this router's loopback (2.2.2.2/32) into BGP with a `network` statement.
!
line vty
!
