! r3 - AS 65003  (upstream B, pre-built; do not edit)
! Receives 1.1.1.1/32 from r1 and re-advertises it to the observer r4.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.13.3/24
!
interface eth2
 ip address 10.0.34.3/24
!
router bgp 65003
 no bgp ebgp-requires-policy
 neighbor 10.0.13.1 remote-as 65001
 neighbor 10.0.34.4 remote-as 65004
!
line vty
!
