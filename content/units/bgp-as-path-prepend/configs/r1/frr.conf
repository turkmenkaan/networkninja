! r1 - AS 65001  (GUIDED starting state)
! r1 advertises 1.1.1.1/32 and is dual-homed to two upstreams:
!   r2 (AS 65002) over 10.0.12.0/24  -- this is the path we WANT inbound to use
!   r3 (AS 65003) over 10.0.13.0/24  -- the path we want to make less attractive
! Base addressing and both eBGP sessions are pre-staged. Steering inbound traffic
! by lengthening the AS_PATH we hand to r3 is yours to add.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.13.3 remote-as 65003
 network 1.1.1.1/32
!
! TODO: prepend your own ASN (65001) on the advertisement you send to r3
!       (10.0.13.3) so the path through r3 looks longer and r4 prefers r2.
!
line vty
!
