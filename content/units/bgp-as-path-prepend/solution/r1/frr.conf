! r1 - AS 65001  (SOLUTION)
! Dual-homed to r2 (upstream A, preferred) and r3 (upstream B). We prepend our
! own ASN twice on the advertisement we hand r3, so the path via r3 carries a
! longer AS_PATH and the far observer r4 prefers the path via r2.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.13.3 remote-as 65003
 neighbor 10.0.13.3 route-map PREPEND-TO-B out
 network 1.1.1.1/32
!
route-map PREPEND-TO-B permit 10
 set as-path prepend 65001 65001
!
line vty
!
