! r2 - AS 65002 (transit)  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything BGP is yours to build.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.23.2/24
!
! Build BGP here: bring up eBGP and advertise this router's loopback.
!
line vty
!
