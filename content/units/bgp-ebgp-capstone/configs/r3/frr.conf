! r3 - AS 65003  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything BGP is yours to build.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.23.3/24
!
! Build BGP here: bring up eBGP and advertise this router's loopback.
!
line vty
!
