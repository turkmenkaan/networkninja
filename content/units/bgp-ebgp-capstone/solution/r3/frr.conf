! r3 - AS 65003  (SOLUTION)
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.23.3/24
!
router bgp 65003
 no bgp ebgp-requires-policy
 neighbor 10.0.23.2 remote-as 65002
 network 3.3.3.3/32
!
line vty
!
