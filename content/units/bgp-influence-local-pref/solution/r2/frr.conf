! r2 - AS 65002  (SOLUTION - unchanged from starting state, upstream A)
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
ip route 100.64.0.0/24 blackhole
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 network 100.64.0.0/24
!
line vty
!
