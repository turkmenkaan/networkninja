! r1 - AS 65001  (SOLUTION)
! Dual-homed to r2 (AS 65002, upstream A) and r3 (AS 65003, upstream B).
! An inbound route-map raises LOCAL_PREF on routes from r2 so OUTBOUND traffic
! to 100.64.0.0/24 exits via upstream A.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.13.3 remote-as 65003
 neighbor 10.0.12.2 route-map PREFER-UPSTREAM-A in
!
route-map PREFER-UPSTREAM-A permit 10
 set local-preference 200
!
line vty
!
