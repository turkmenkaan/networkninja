! r1 - AS 65001  (GUIDED starting state)
! Your AS, dual-homed to two upstreams: r2 (AS 65002) and r3 (AS 65003).
! Both eBGP sessions are pre-staged so routes already flow. Base addressing
! is configured. Steering the OUTBOUND path is yours to add.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.13.3 remote-as 65003
!
! TODO: both upstreams advertise 100.64.0.0/24, and right now BGP picks one of
! them by tie-breaker (lower router-id / peer address). Make r2 (10.0.12.2),
! "upstream A", the preferred exit for OUTBOUND traffic by raising LOCAL_PREF
! on the routes you learn from it. Build an inbound route-map that sets
! local-preference 200 and apply it to the 10.0.12.2 neighbor.
!
line vty
!
