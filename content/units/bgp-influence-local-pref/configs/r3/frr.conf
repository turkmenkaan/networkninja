! r3 - AS 65003  (upstream B - fully configured, no edits needed)
! Originates the SAME prefix 100.64.0.0/24 toward r1 and peers eBGP with it.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.13.3/24
!
! Blackhole the prefix locally so `network` has something to advertise.
ip route 100.64.0.0/24 blackhole
!
router bgp 65003
 no bgp ebgp-requires-policy
 neighbor 10.0.13.1 remote-as 65001
 network 100.64.0.0/24
!
line vty
!
