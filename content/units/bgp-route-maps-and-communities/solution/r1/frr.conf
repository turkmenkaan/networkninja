! r1 - AS 65001  (SOLUTION)
! Both prefixes are originated, then tagged on the way out to r2:
!   172.16.10.0/24 -> community 65001:100  (r2 prefers it via local-pref 300)
!   172.16.20.0/24 -> community no-export   (r2 keeps it; never reaches r3)
! send-community is what actually puts the communities on the wire.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.12.2 route-map TAG out
 neighbor 10.0.12.2 send-community
 network 172.16.10.0/24
 network 172.16.20.0/24
!
ip prefix-list P10 seq 5 permit 172.16.10.0/24
ip prefix-list P20 seq 5 permit 172.16.20.0/24
!
route-map TAG permit 10
 match ip address prefix-list P10
 set community 65001:100
!
route-map TAG permit 20
 match ip address prefix-list P20
 set community no-export
!
route-map TAG permit 30
!
line vty
!
