! r2 - AS 65002  (TRANSIT, pre-built - NOT the learner's job)
! r2 peers eBGP with r1 (AS 65001) and r3 (AS 65003). It is already wired to
! ACT on the community color r1 will attach: an inbound route-map matches
! community 65001:100 and bumps local-preference to 300. It also forwards
! communities on to r3 with send-community. You configure NOTHING here; r2
! exists so you can watch a downstream AS react to your tags.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.23.2/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 neighbor 10.0.12.1 route-map FROM-R1 in
 neighbor 10.0.23.3 remote-as 65003
 neighbor 10.0.23.3 send-community
!
! Match r1's "premium" color and prefer those routes.
bgp community-list standard CUST-100 permit 65001:100
!
route-map FROM-R1 permit 10
 match community CUST-100
 set local-preference 300
!
route-map FROM-R1 permit 20
!
line vty
!
