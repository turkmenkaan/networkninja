! r3 - AS 65003  (FAR OBSERVER, pre-built - NOT the learner's job)
! r3 just peers eBGP with r2 (AS 65002) and receives whatever r2 passes along.
! It is the proof point for no-export: a prefix r1 tags no-export should reach
! r2 but be withheld at the AS 65002 boundary, so it NEVER shows up here.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.23.3/24
!
router bgp 65003
 no bgp ebgp-requires-policy
 neighbor 10.0.23.2 remote-as 65002
!
line vty
!
