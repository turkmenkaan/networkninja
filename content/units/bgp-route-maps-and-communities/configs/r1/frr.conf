! r1 - AS 65001  (GUIDED starting state)
! Base addressing and the eBGP session to r2 are pre-staged, and r1 already
! originates BOTH prefixes (172.16.10.0/24 and 172.16.20.0/24). Right now they
! leave r1 UNTAGGED. Your job is to color them with communities on the way out.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family (simpler for these labs).
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 network 172.16.10.0/24
 network 172.16.20.0/24
!
! TODO: tag the two prefixes on advertisement to r2, then make sure the
!       communities are actually sent.
!   1. Tag 172.16.10.0/24 with community 65001:100 (your "premium customer" color).
!   2. Tag 172.16.20.0/24 with the well-known community no-export so it stays
!      inside AS 65002 and never reaches AS 65003.
!   3. Apply your tagging route-map outbound to r2 AND add send-community, or
!      the tags never leave this router.
!   Hint: select each prefix with an `ip prefix-list`, match it in a
!   `route-map ... permit` clause, and `set community ...`. Remember a trailing
!   permit clause so untagged routes are not silently dropped.
!
line vty
!
