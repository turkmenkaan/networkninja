# Objectives + verification for snmp-observe-a-walk.
# This is a read-only OBSERVATION lab - the agent boots already configured
# and answering, so these objectives don't ask the learner to fix anything;
# they confirm there is a healthy, responding agent to poll.
# Each check is read-only and idempotent: it observes state, never changes it.
# Tier 1 renders these as a self-verify checklist (commands shown to the learner).
# Tier 2 executes the identical checks against the live nodes to auto-grade.
#
# JSON-wrap pattern (from the SNMP lab conventions in
# docs/curriculum/snmp-fundamentals.md): net-snmp client tools print plain
# text, not JSON, so each `check.command` runs an snmp* tool with `-Oqv`
# (quick, value-only output) on the nms node and pipes it through `jq -R`
# to wrap that text as a JSON object the auto-grader can assert on.
#
# ============================ TO-CONFIRM ============================
# This lab has NOT been deployed. Every assertion below is SCHEMA-DERIVED
# (from the SNMPv2c MIB definitions and net-snmp's documented output), not
# observed on a live agent. Before relying on any of them, confirm on a
# real Linux + Docker deploy:
#   - net-snmp installs and snmpd starts (see topology.clab.yml TO-CONFIRMs);
#   - the exact text net-snmp prints for `-Oqv` on each OID;
#   - that every jq path ($.value, $.count) matches that wrapped output.
# Each assertion is individually flagged # TO-CONFIRM below.
# ===================================================================

objectives:
  - id: agent-responds
    description: "The agent answers SNMP: sysDescr.0 returns a value, proving it is reachable and snmpd is up."
    # Command the learner runs (human-readable output). The check below is the
    # JSON-wrapped equivalent for the Tier-2 auto-grader.
    display_command: "docker exec -it clab-snmp-observe-a-walk-nms snmpget -v2c -c public 10.0.0.11 1.3.6.1.2.1.1.1.0"
    check:
      node: nms
      # -Oqv => quick, value-only (just the sysDescr string, no OID/type).
      # jq -R wraps the raw line as {"value": "<text>"}.
      command: "snmpget -Oqv -v2c -c public 10.0.0.11 1.3.6.1.2.1.1.1.0 | jq -R '{value: .}'"
      parse: json
      assert:
        # Alpine runs the Linux kernel, so sysDescr (1.3.6.1.2.1.1.1.0)
        # contains "Linux". `contains` keeps this robust to kernel version
        # and hostname noise in the rest of the string.
        path: "$.value"
        contains: "Linux"   # TO-CONFIRM: exact sysDescr text not yet observed on a live agent.
    hint: >
      What to look for: sysDescr.0 (1.3.6.1.2.1.1.1.0) is the first thing every
      agent answers. On this Alpine-based agent the description string includes
      "Linux". If you get a timeout instead, the agent is unreachable or snmpd
      did not start (see the troubleshooting note in the lab).

  - id: system-group-readable
    description: "Walking the system group exposes the configured sysName 'snmp-agent'."
    display_command: "docker exec -it clab-snmp-observe-a-walk-nms snmpget -v2c -c public 10.0.0.11 1.3.6.1.2.1.1.5.0"
    check:
      node: nms
      # sysName.0 = 1.3.6.1.2.1.1.5.0. Value-only output wrapped as {"value": ...}.
      command: "snmpget -Oqv -v2c -c public 10.0.0.11 1.3.6.1.2.1.1.5.0 | jq -R '{value: .}'"
      parse: json
      assert:
        # snmpd.conf sets `sysName snmp-agent`, so sysName.0 returns that string.
        path: "$.value"
        contains: "snmp-agent"   # TO-CONFIRM: confirm snmpd actually serves the configured sysName.
    hint: >
      What to look for: sysName.0 (1.3.6.1.2.1.1.5.0) should read "snmp-agent",
      the value pre-staged in the agent's snmpd.conf. Seeing the configured name
      come back proves you are reading the system group off this specific agent.

  - id: interface-table-readable
    description: "The interface table (ifDescr) returns at least one interface, so the tabular MIB is populated."
    display_command: "docker exec -it clab-snmp-observe-a-walk-nms snmpwalk -v2c -c public 10.0.0.11 1.3.6.1.2.1.2.2.1.2"
    check:
      node: nms
      # ifDescr column = 1.3.6.1.2.1.2.2.1.2 (one row per interface). -Oqv emits
      # one value per line; count non-empty lines and wrap as {"count": N}.
      # grep -c . counts non-empty lines; jq wraps that integer as {"count": N}.
      command: "snmpwalk -Oqv -v2c -c public 10.0.0.11 1.3.6.1.2.1.2.2.1.2 | grep -c . | jq -R '{count: (. | tonumber)}'"
      parse: json
      assert:
        # The wrap above yields {"count": N}; assert the agent reported at least
        # one interface row.
        path: "$.count"
        greater_than: 0   # TO-CONFIRM: confirm ifTable is populated (at least lo + eth1) and the count wrap parses.
    hint: >
      What to look for: walking ifDescr (1.3.6.1.2.1.2.2.1.2) returns one line
      per interface, e.g. lo and eth1. More than zero rows means the interface
      table is populated and the tabular MIB is readable. Each row is indexed by
      ifIndex - that index is how a tabular object distinguishes interfaces.
