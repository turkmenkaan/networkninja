# snmpd.conf for the "agent" node (OBSERVATION LAB - boots fully configured).
#
# This is the pre-staged config for a read-only observation lab. The agent
# boots ready to answer SNMPv2c reads; nothing here is the learner's to
# change. They simply poll it from the nms node. (You configure an agent
# yourself in the next module, snmp-enable-the-agent.)
#
# Keep it minimal and standard: one read-only community over the full
# standard tree, plus friendly system-group values so the walk returns
# meaningful, recognizable answers.

# Read-only community "public" granting read access to the entire standard
# OID tree (.1 / iso). rocommunity = read-only; no rwcommunity, so no SETs.
rocommunity public

# System group values (mib-2 system, OID 1.3.6.1.2.1.1). These show up when
# the learner walks the system tree, so make them human-readable.
sysName     snmp-agent
sysLocation NetworkNinjas Lab Rack
sysContact  noc@networkninja.example
