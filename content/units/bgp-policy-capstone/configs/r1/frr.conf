! r1 - AS 65001  (the CUSTOMER; pre-built, nothing to change here)
! r1 originates three prefixes toward r2 (your ISP). Two are its real
! allocations (203.0.113.0/24 and 198.51.100.0/24). The third, 192.168.0.0/16,
! is an RFC 1918 bogon it should never be advertising: your ISP edge policy on
! r2 has to catch and drop it.
! The blackhole static routes give each prefix something to resolve against
! so BGP will actually advertise the matching `network` statements.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
ip route 203.0.113.0/24 blackhole
ip route 198.51.100.0/24 blackhole
ip route 192.168.0.0/16 blackhole
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 network 203.0.113.0/24
 network 198.51.100.0/24
 network 192.168.0.0/16
!
line vty
!
