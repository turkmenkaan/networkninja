! r3 - AS 65003  (the UPSTREAM / transit; pre-built, nothing to change here)
! r3 is your upstream provider. It originates 8.8.8.0/24, a stand-in for the
! rest of the internet, so r2 also learns something from above. The blackhole
! static route gives the prefix something to resolve against.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.23.3/24
!
ip route 8.8.8.0/24 blackhole
!
router bgp 65003
 no bgp ebgp-requires-policy
 neighbor 10.0.23.2 remote-as 65002
 network 8.8.8.0/24
!
line vty
!
