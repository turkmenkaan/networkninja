! r2 - AS 65002 (YOUR ISP)  (CHALLENGE starting state)
! Only base addressing is pre-staged: eth1 toward the customer, eth2 toward the
! upstream, and the loopback. There is NO `router bgp` block at all. Everything
! BGP and policy is yours to build from a blank slate.
!
! TODO - build your ISP edge policy on r2:
!   [ ] router bgp 65002 with `no bgp ebgp-requires-policy`
!   [ ] eBGP to the CUSTOMER  : neighbor 10.0.12.1 remote-as 65001
!   [ ] eBGP to the UPSTREAM  : neighbor 10.0.23.3 remote-as 65003
!   [ ] send communities to the upstream: neighbor 10.0.23.3 send-community
!   [ ] a prefix-list that permits ONLY the customer's real prefixes
!       (203.0.113.0/24 and 198.51.100.0/24) so 192.168.0.0/16 is dropped
!   [ ] an inbound route-map on the customer session that matches that
!       prefix-list, sets local-preference 200, and sets community 65002:1000
!   [ ] apply the route-map inbound: neighbor 10.0.12.1 route-map CUSTOMER-IN in
!
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.23.2/24
!
! Build your BGP process and policy here.
!
line vty
!
