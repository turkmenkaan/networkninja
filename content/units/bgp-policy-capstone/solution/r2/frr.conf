! r2 - AS 65002 (YOUR ISP)  (SOLUTION)
! The complete ISP edge policy built from the blank slate:
!   - eBGP to the customer (r1, AS 65001) and the upstream (r3, AS 65003)
!   - an inbound prefix-list that permits ONLY the customer's real allocations
!     (203.0.113.0/24, 198.51.100.0/24); the implicit deny drops the
!     192.168.0.0/16 bogon leak
!   - an inbound route-map that matches that prefix-list, raises LOCAL_PREF to
!     200 so customer routes beat the upstream, and tags them 65002:1000
!   - send-community toward the upstream so the tag can travel
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.23.2/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 neighbor 10.0.12.1 route-map CUSTOMER-IN in
 neighbor 10.0.23.3 remote-as 65003
 neighbor 10.0.23.3 send-community
!
ip prefix-list CUST-OK seq 5 permit 203.0.113.0/24
ip prefix-list CUST-OK seq 10 permit 198.51.100.0/24
!
route-map CUSTOMER-IN permit 10
 match ip address prefix-list CUST-OK
 set local-preference 200
 set community 65002:1000
!
line vty
!
