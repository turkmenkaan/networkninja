# Lab name → containers are named clab-bgp-policy-capstone-<node>.
name: bgp-policy-capstone

topology:
  nodes:
    r1:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r1/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons
    r2:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r2/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons
    r3:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r3/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons

  links:
    # CUSTOMER AS 65001 (r1) <----> ISP AS 65002 (r2), subnet 10.0.12.0/24
    - endpoints: ["r1:eth1", "r2:eth1"]
    # ISP AS 65002 (r2) <----> UPSTREAM AS 65003 (r3), subnet 10.0.23.0/24
    - endpoints: ["r2:eth2", "r3:eth1"]
