! r3 - AS 65002  (external neighbor, fully configured)
! r3 is the external router. It runs eBGP to r1 on the 10.0.13.0/24 edge link
! and advertises its loopback 3.3.3.3/32. It has no OSPF and no knowledge of
! AS 65001's internals. Nothing to change here.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.13.3/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.13.1 remote-as 65001
 network 3.3.3.3/32
!
line vty
!
