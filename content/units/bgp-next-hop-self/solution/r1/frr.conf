! r1 - AS 65001  (SOLUTION)
! The one fix is `neighbor 2.2.2.2 next-hop-self` under router bgp 65001.
! It makes r1 rewrite the next-hop of routes it sends to its iBGP peer r2 to
! its own loopback (1.1.1.1), which r2 can reach via OSPF. The external prefix
! 3.3.3.3/32 then becomes VALID and best on r2.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router ospf
 network 10.0.12.0/24 area 0
 network 1.1.1.1/32 area 0
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 2.2.2.2 remote-as 65001
 neighbor 2.2.2.2 update-source lo
 neighbor 2.2.2.2 next-hop-self
 neighbor 10.0.13.3 remote-as 65002
 network 1.1.1.1/32
!
line vty
!
