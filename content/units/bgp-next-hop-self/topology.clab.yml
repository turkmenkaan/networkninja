# Lab name → containers are named clab-bgp-next-hop-self-<node>.
name: bgp-next-hop-self

topology:
  nodes:
    r1:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r1/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons
    r2:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r2/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons
    r3:
      kind: linux
      image: frrouting/frr:v8.4.1
      binds:
        - configs/r3/frr.conf:/etc/frr/frr.conf
        - configs/daemons:/etc/frr/daemons

  links:
    # INTERNAL: r1 <----> r2 in AS 65001, subnet 10.0.12.0/24 (r1 .1, r2 .2).
    - endpoints: ["r1:eth1", "r2:eth1"]
    # eBGP EDGE: r1 <----> r3 (AS 65002), subnet 10.0.13.0/24 (r1 .1, r3 .3).
    - endpoints: ["r1:eth2", "r3:eth1"]
