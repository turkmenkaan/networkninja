! r1 - AS 65001  (GUIDED starting state)
! r1 is the AS 65001 edge router. It runs eBGP to r3 (AS 65002) on the
! 10.0.13.0/24 link and iBGP to r2 over loopbacks on the OSPF underlay.
! Everything below already works: the session to r2 is up and r1 learns
! r3's prefix (3.3.3.3/32) over eBGP and re-advertises it to r2 over iBGP.
! Note the OSPF underlay deliberately advertises ONLY the internal link
! (10.0.12.0/24) and the loopbacks - the eBGP edge link (10.0.13.0/24) is
! NOT in OSPF, so r2 has no route to that subnet. That is the whole point.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router ospf
 network 10.0.12.0/24 area 0
 network 1.1.1.1/32 area 0
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 2.2.2.2 remote-as 65001
 neighbor 2.2.2.2 update-source lo
 neighbor 10.0.13.3 remote-as 65002
 network 1.1.1.1/32
 !
 ! TODO: the external prefix 3.3.3.3/32 reaches r2 over iBGP but stays INVALID
 !       because r1 hands it to r2 with the eBGP next-hop (10.0.13.3), which r2
 !       cannot reach. Make r1 set ITSELF as the next-hop for its iBGP peer r2,
 !       so the next-hop becomes r1's loopback (1.1.1.1), reachable via OSPF.
!
line vty
!
