! r2 - AS 65001  (GUIDED starting state)
! r2 is an internal AS 65001 router. It has no external links; it only peers
! iBGP with r1 over loopbacks on the OSPF underlay. OSPF advertises the
! internal link and both loopbacks, so r2 can reach r1's loopback (1.1.1.1).
! r2 already learns the external prefix 3.3.3.3/32 from r1 over iBGP - but
! watch what state that route is in. The fix lives on r1, not here.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
router ospf
 network 10.0.12.0/24 area 0
 network 2.2.2.2/32 area 0
!
router bgp 65001
 neighbor 1.1.1.1 remote-as 65001
 neighbor 1.1.1.1 update-source lo
 network 2.2.2.2/32
!
line vty
!
