! r1 - AS 65001  (OBSERVATION LAB - boots fully configured)
! This lab is read-only: the eBGP session to r2 is already up and r1 is
! already advertising its loopback, so there is a real route + AS_PATH to
! observe. Nothing here is yours to change.
! Using the "traditional" defaults profile so `neighbor ... remote-as` and the
! `network` statement auto-activate the IPv4-unicast address family.
frr version 9.1
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
router bgp 65001
 neighbor 10.0.12.2 remote-as 65002
 network 1.1.1.1/32
!
line vty
!
