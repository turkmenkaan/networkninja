! r1 - AS 65001  (OBSERVATION LAB - boots fully configured)
! This lab is read-only: the eBGP session to r2 is already up and r1 is
! already advertising its loopback, so there is a real route + AS_PATH to
! observe. Nothing here is yours to change.
! Using the "traditional" defaults profile so `neighbor ... remote-as` and the
! `network` statement auto-activate the IPv4-unicast address family.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
! FRR enforces RFC 8212 by default (bgp ebgp-requires-policy): an eBGP peer with
! no in/out policy has its routes filtered, shown as "(Policy)" in
! `show ip bgp summary` instead of a prefix count. Disable it so this
! fundamentals lab exchanges routes without route-maps (policy comes later).
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 network 1.1.1.1/32
!
line vty
!
