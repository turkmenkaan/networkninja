! r2 - AS 65002  (OBSERVATION LAB - boots fully configured)
! Mirror of r1: the eBGP session to r1 is already up and r2 is already
! advertising its loopback. Read-only lab - nothing here is yours to change.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
! See r1: FRR's default RFC 8212 (bgp ebgp-requires-policy) would filter routes
! on an eBGP peer with no policy; disable it for this fundamentals lab.
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 network 2.2.2.2/32
!
line vty
!
