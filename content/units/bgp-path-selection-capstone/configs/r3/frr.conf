! r3 - AS 65003  (upstream B, BACKUP - PRE-CONFIGURED, do not edit)
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.13.3/24
!
interface eth2
 ip address 10.0.34.3/24
!
router bgp 65003
 no bgp ebgp-requires-policy
 neighbor 10.0.13.1 remote-as 65001
 neighbor 10.0.34.4 remote-as 65004
 network 3.3.3.3/32
!
line vty
!
