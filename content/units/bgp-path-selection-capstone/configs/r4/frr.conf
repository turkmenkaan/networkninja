! r4 - AS 65004  (the internet - PRE-CONFIGURED, do not edit)
! Originates the destination prefix 100.64.0.0/24 toward both upstreams.
frr version 8.4
frr defaults traditional
hostname r4
log stdout
no ipv6 forwarding
!
interface lo
 ip address 4.4.4.4/32
!
interface eth1
 ip address 10.0.24.4/24
!
interface eth2
 ip address 10.0.34.4/24
!
ip route 100.64.0.0/24 blackhole
!
router bgp 65004
 no bgp ebgp-requires-policy
 neighbor 10.0.24.2 remote-as 65002
 neighbor 10.0.34.3 remote-as 65003
 network 4.4.4.4/32
 network 100.64.0.0/24
!
line vty
!
