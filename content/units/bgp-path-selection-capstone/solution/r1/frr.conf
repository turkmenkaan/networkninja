! r1 - AS 65001  (your edge router - SOLUTION)
! Dual-homed to upstream A (r2, PRIMARY) and upstream B (r3, BACKUP).
! OUTBOUND traffic is steered with LOCAL_PREF (higher wins), applied INBOUND
! on the session toward the PRIMARY. INBOUND traffic is steered by prepending
! our own AS, applied OUTBOUND on the session toward the BACKUP so that path
! looks longer to the rest of the internet.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.13.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.13.3 remote-as 65003
 network 1.1.1.1/32
 neighbor 10.0.12.2 route-map PRIMARY-IN in
 neighbor 10.0.13.3 route-map BACKUP-OUT out
!
! OUTBOUND policy: prefer upstream A for traffic LEAVING our AS.
! Raise the LOCAL_PREF of everything learned from the primary so it wins
! best-path selection over the same prefixes learned from the backup.
route-map PRIMARY-IN permit 10
 set local-preference 200
!
! INBOUND policy: make the path through upstream B look worse to the world.
! Prepend our own AS twice on advertisements OUT toward the backup so remote
! ASes see a longer AS_PATH that way and steer return traffic through A.
route-map BACKUP-OUT permit 10
 set as-path prepend 65001 65001
!
line vty
!
