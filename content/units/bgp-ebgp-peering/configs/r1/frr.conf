! r1 - AS 65001  (GUIDED starting state)
! Base addressing is pre-staged. The BGP configuration is yours to add.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family (simpler for a first lab).
frr version 9.1
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
! TODO: configure an eBGP session to r2 (10.0.12.2) in AS 65002.
!
line vty
!
