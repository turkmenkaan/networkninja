! r2 - AS 65002  (GUIDED starting state)
! Base addressing is pre-staged. The BGP configuration is yours to add.
frr version 9.1
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
! TODO: configure an eBGP session to r1 (10.0.12.1) in AS 65001.
!
line vty
!
