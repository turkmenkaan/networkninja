! r1 - AS 65001  (GUIDED starting state)
! Base addressing and BOTH eBGP sessions to r2 are pre-staged, and r1 already
! advertises 1.1.1.1/32 over both links. Your job is the MED policy.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family (simpler for these labs).
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.12.1/24
!
interface eth2
 ip address 10.0.34.1/24
!
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.34.2 remote-as 65002
 network 1.1.1.1/32
!
! TODO: tell r2 to prefer link1 (10.0.12.0/24) by advertising a LOWER MED
! (metric) on link1 than on link2. Build two outbound route-maps on r1:
!   - one that sets a low metric, applied to neighbor 10.0.12.2 ... out
!   - one that sets a high metric, applied to neighbor 10.0.34.2 ... out
! Lower MED wins, so r2 should pick the link1 entry.
!
line vty
!
