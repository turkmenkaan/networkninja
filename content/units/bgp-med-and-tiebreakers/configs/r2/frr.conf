! r2 - AS 65002  (GUIDED starting state)
! Base addressing and BOTH eBGP sessions to r1 are pre-staged. r2 receives
! 1.1.1.1/32 over both links and is the router that will choose between them.
! No changes are needed on r2 for this lab; the MED policy lives on r1.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.34.2/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 neighbor 10.0.34.1 remote-as 65001
!
line vty
!
