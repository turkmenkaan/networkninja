! r2 - AS 65002  (YOUR router; GUIDED starting state)
! Base addressing and the eBGP session to the customer (r1) are pre-staged.
! Right now r2 accepts everything r1 sends, including the 10.0.0.0/8 bogon.
! Your job: filter the inbound updates so only the customer's real
! allocations (203.0.113.0/24 and 198.51.100.0/24) are accepted.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 !
 ! TODO: accept ONLY 203.0.113.0/24 and 198.51.100.0/24 from r1 (10.0.12.1),
 ! TODO: and reject everything else (notably the 10.0.0.0/8 bogon).
 ! TODO: build an inbound prefix-list and apply it to the neighbor.
!
line vty
!
