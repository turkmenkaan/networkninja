! r2 - AS 65002  (YOUR router; SOLUTION)
! The CUSTOMER-IN prefix-list permits only the two legitimate allocations.
! Anything else (the 10.0.0.0/8 bogon) hits the implicit deny at the end of
! the list and is dropped. The list is applied inbound on the eBGP neighbor.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
ip prefix-list CUSTOMER-IN seq 5 permit 203.0.113.0/24
ip prefix-list CUSTOMER-IN seq 10 permit 198.51.100.0/24
!
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.12.1 remote-as 65001
 neighbor 10.0.12.1 prefix-list CUSTOMER-IN in
!
line vty
!
