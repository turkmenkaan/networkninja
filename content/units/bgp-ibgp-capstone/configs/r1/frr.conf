! r1 - AS 65000 (transit, edge toward r4)  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything routing is yours to build.
! Using the "traditional" defaults profile so `neighbor ... remote-as` auto-
! activates the IPv4-unicast address family.
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.14.1/24
!
interface eth2
 ip address 10.0.12.1/24
!
! Build the transit AS here.
!
line vty
!
