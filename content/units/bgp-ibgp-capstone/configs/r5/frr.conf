! r5 - AS 65002 (external)  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything routing is yours to build.
frr version 8.4
frr defaults traditional
hostname r5
log stdout
no ipv6 forwarding
!
interface lo
 ip address 5.5.5.5/32
!
interface eth1
 ip address 10.0.35.5/24
!
! Build the eBGP edge + advertise this loopback.
!
line vty
!
