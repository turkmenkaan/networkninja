! r2 - AS 65000 (transit, internal core)  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything routing is yours to build.
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.23.2/24
!
! Build the transit AS here.
!
line vty
!
