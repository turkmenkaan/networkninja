! r3 - AS 65000 (transit, edge toward r5)  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything routing is yours to build.
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.23.3/24
!
interface eth2
 ip address 10.0.35.3/24
!
! Build the transit AS here.
!
line vty
!
