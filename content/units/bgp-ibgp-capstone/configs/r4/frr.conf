! r4 - AS 65001 (external)  (CHALLENGE starting state)
! Only base addressing is pre-staged. Everything routing is yours to build.
frr version 8.4
frr defaults traditional
hostname r4
log stdout
no ipv6 forwarding
!
interface lo
 ip address 4.4.4.4/32
!
interface eth1
 ip address 10.0.14.4/24
!
! Build the eBGP edge + advertise this loopback.
!
line vty
!
