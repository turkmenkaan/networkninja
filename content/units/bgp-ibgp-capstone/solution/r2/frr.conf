! r2 - AS 65000 (transit, internal core)  (SOLUTION)
frr version 8.4
frr defaults traditional
hostname r2
log stdout
no ipv6 forwarding
!
interface lo
 ip address 2.2.2.2/32
!
interface eth1
 ip address 10.0.12.2/24
!
interface eth2
 ip address 10.0.23.2/24
!
! OSPF underlay: both internal links + this loopback. r2 is the core, so it
! advertises both internal subnets and glues r1 and r3 together.
router ospf
 network 10.0.12.0/24 area 0
 network 10.0.23.0/24 area 0
 network 2.2.2.2/32 area 0
!
router bgp 65000
 no bgp ebgp-requires-policy
 ! Full iBGP mesh on loopbacks: r2 peers both edge routers.
 neighbor 1.1.1.1 remote-as 65000
 neighbor 1.1.1.1 update-source lo
 neighbor 3.3.3.3 remote-as 65000
 neighbor 3.3.3.3 update-source lo
!
line vty
!
