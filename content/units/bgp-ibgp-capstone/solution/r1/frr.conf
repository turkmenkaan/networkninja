! r1 - AS 65000 (transit, edge toward r4)  (SOLUTION)
frr version 8.4
frr defaults traditional
hostname r1
log stdout
no ipv6 forwarding
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.14.1/24
!
interface eth2
 ip address 10.0.12.1/24
!
! OSPF underlay: internal link to r2 + this loopback. The eBGP edge link
! (10.0.14.0/24) is deliberately NOT advertised into OSPF.
router ospf
 network 10.0.12.0/24 area 0
 network 1.1.1.1/32 area 0
!
router bgp 65000
 no bgp ebgp-requires-policy
 ! Full iBGP mesh on loopbacks: r1 peers both other internal routers.
 neighbor 2.2.2.2 remote-as 65000
 neighbor 2.2.2.2 update-source lo
 neighbor 3.3.3.3 remote-as 65000
 neighbor 3.3.3.3 update-source lo
 ! This is an edge router: rewrite the next-hop to its own loopback so the
 ! internal routers can reach external prefixes learned over eBGP.
 neighbor 2.2.2.2 next-hop-self
 neighbor 3.3.3.3 next-hop-self
 ! eBGP edge to r4 (AS 65001) on the interface address.
 neighbor 10.0.14.4 remote-as 65001
!
line vty
!
