! r5 - AS 65002 (external)  (SOLUTION)
frr version 8.4
frr defaults traditional
hostname r5
log stdout
no ipv6 forwarding
!
interface lo
 ip address 5.5.5.5/32
!
interface eth1
 ip address 10.0.35.5/24
!
! No OSPF: r5 is outside the transit AS. Just one eBGP edge and its loopback.
router bgp 65002
 no bgp ebgp-requires-policy
 neighbor 10.0.35.3 remote-as 65000
 network 5.5.5.5/32
!
line vty
!
