! r4 - AS 65001 (external)  (SOLUTION)
frr version 8.4
frr defaults traditional
hostname r4
log stdout
no ipv6 forwarding
!
interface lo
 ip address 4.4.4.4/32
!
interface eth1
 ip address 10.0.14.4/24
!
! No OSPF: r4 is outside the transit AS. Just one eBGP edge and its loopback.
router bgp 65001
 no bgp ebgp-requires-policy
 neighbor 10.0.14.1 remote-as 65000
 network 4.4.4.4/32
!
line vty
!
