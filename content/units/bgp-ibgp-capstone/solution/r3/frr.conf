! r3 - AS 65000 (transit, edge toward r5)  (SOLUTION)
frr version 8.4
frr defaults traditional
hostname r3
log stdout
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.23.3/24
!
interface eth2
 ip address 10.0.35.3/24
!
! OSPF underlay: internal link to r2 + this loopback. The eBGP edge link
! (10.0.35.0/24) is deliberately NOT advertised into OSPF.
router ospf
 network 10.0.23.0/24 area 0
 network 3.3.3.3/32 area 0
!
router bgp 65000
 no bgp ebgp-requires-policy
 ! Full iBGP mesh on loopbacks: r3 peers both other internal routers.
 neighbor 1.1.1.1 remote-as 65000
 neighbor 1.1.1.1 update-source lo
 neighbor 2.2.2.2 remote-as 65000
 neighbor 2.2.2.2 update-source lo
 ! This is an edge router: rewrite the next-hop to its own loopback so the
 ! internal routers can reach external prefixes learned over eBGP.
 neighbor 1.1.1.1 next-hop-self
 neighbor 2.2.2.2 next-hop-self
 ! eBGP edge to r5 (AS 65002) on the interface address.
 neighbor 10.0.35.5 remote-as 65002
!
line vty
!
